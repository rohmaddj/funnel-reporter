# ── Funnel Variants (GA4 page_view path filters) ──────────────────────────────
#
# How this funnel maps to paths:
#
#   Funnel v4:
#     Homepage      → /c/          (prefix match)
#     Opt-in page   → /opt-in-v4   (prefix match)
#     Offer page    → /offer-v4    (prefix match)
#
#   Funnel v2:
#     Homepage      → /a/ or /b/   (two prefix matches, aggregated)
#     Opt-in page   → /opt-in-v2   (prefix match)
#     Offer page    → /offer-v2    (prefix match)
#
# GA4 signal used: page_view count per path prefix.
# CTA click proxy: page_view on /opt-in-* = homepage CTA clicked.
# Lead proxy:      page_view on /offer-*  = opt-in completed / lead captured.
# Checkout click:  CPV Lab offer-stats Clicks field (ClickBank checkout URL).
#
variants:
  funnel_v4:
    label: "Funnel v4 (/c/)"
    homepage_paths:
      - "/c/"
    optin_path: "/opt-in-v4"
    offer_path: "/offer/v4"     # actual site URL (used for GA4 path filter)

  funnel_v2:
    label: "Funnel v2 (/a/ /b/)"
    homepage_paths:
      - "/a/"
      - "/b/"
    optin_path: "/opt-in-v2"
    offer_path: "/offer/v2"     # actual site URL (used for GA4 path filter)